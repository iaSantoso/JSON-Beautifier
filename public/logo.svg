<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">JSON Glow logo</title>
  <desc id="desc">A glowing JSON bracket mark with a clean monogram.</desc>
  <defs>
    <linearGradient id="markGradient" x1="18" y1="16" x2="110" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#55e0c6"/>
      <stop offset="0.52" stop-color="#8cff7a"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <radialGradient id="glowGradient" cx="0" cy="0" r="1" gradientTransform="matrix(58 62 -62 58 42 35)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#55e0c6" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#55e0c6" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-24" y="-24" width="176" height="176" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#000000" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#55e0c6" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="#0b0f14"/>
  <rect x="7" y="7" width="114" height="114" rx="25" fill="url(#glowGradient)"/>
  <rect x="13" y="13" width="102" height="102" rx="22" fill="#121820" stroke="#ffffff" stroke-opacity="0.16"/>
  <g filter="url(#softShadow)">
    <path d="M45 35H32c-6 0-10 4-10 10v9c0 5-3 9-8 10 5 1 8 5 8 10v9c0 6 4 10 10 10h13" fill="none" stroke="url(#markGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M83 35h13c6 0 10 4 10 10v9c0 5 3 9 8 10-5 1-8 5-8 10v9c0 6-4 10-10 10H83" fill="none" stroke="url(#markGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M55 45h18c8 0 14 6 14 14v10c0 8-6 14-14 14H55V45Z" fill="none" stroke="#f7fbff" stroke-width="7" stroke-linejoin="round"/>
    <path d="M55 45v38" stroke="#f7fbff" stroke-width="7" stroke-linecap="round"/>
    <circle cx="72" cy="64" r="4" fill="#ffd166"/>
  </g>
</svg>
